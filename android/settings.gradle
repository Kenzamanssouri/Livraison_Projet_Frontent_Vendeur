pluginManagement {
    repositories {
        google()
        mavenCentral()
    }

    includeBuild(
        new File(
            ["node", "--print",
             "require.resolve('@react-native/gradle-plugin/package.json', { paths: [require.resolve('react-native/package.json')] })"]
                .execute(null, rootDir)
                .text
                .trim()
        ).getParentFile()
    )
}

dependencyResolutionManagement {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.name = "VendeurConnecte"

apply from: new File(
  ["node", "--print", "require.resolve('expo/package.json')"]
    .execute(null, rootDir)
    .text
    .trim(),
  "../scripts/autolinking.gradle"
)

useExpoModules()

include(":app")

includeBuild(
  new File(
    ["node", "--print",
     "require.resolve('@react-native/gradle-plugin/package.json', { paths: [require.resolve('react-native/package.json')] })"]
      .execute(null, rootDir)
      .text
      .trim()
  ).getParentFile()
)
